---
name: CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # ratchet:docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4
        with:
          username: bdossantos
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract Dockefile build context, image name and tags
        shell: bash
        id: context
        run: |
          version=$(egrep ' VERSION=(.*)$' 'Dockerfile' | sed 's/^.*=//')
          vcs_ref=$(git rev-parse --short HEAD)
          image_name='home-assistant'
          tags=bdossantos/${image_name}:latest,bdossantos/${image_name}:${version},bdossantos/${image_name}:${version}-${vcs_ref}
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "path=$(dirname ${{ inputs.dockerfile }})" >> $GITHUB_OUTPUT
          echo "tags=${tags}" >> $GITHUB_OUTPUT
          echo "vcs_ref=${vcs_ref}" >> $GITHUB_OUTPUT
      - name: Build and push docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7
        with:
          build-args: |
            BUILD_DATE=${{ steps.context.outputs.build_date }}
            VCS_REF=${{ steps.context.outputs.vcs_ref }}
          context: ${{ steps.context.outputs.path }}
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.context.outputs.tags }}
