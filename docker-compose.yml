---
version: "3"

services:
  home-assistant:
    image: bdossantos/home-assistant:latest
    container_name: home-assistant
    volumes:
      - /dev/bus/usb:/dev/bus/usb:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/dbus:/run/dbus:ro
      - /volume1/homes/admin/Code/bds.home.arpa/homeassistant:/config:rw
    environment:
      - TZ=Europe/Paris
    ports:
      - 5353:5353/udp
      - 8123:8123/tcp
      - 21063:21063/tcp
    #networks:
    #  - home-assistant
    network_mode: host
    restart: always
  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:fbd8062b4529e166e902bd62cd93de2f48b36d50af942620d419657265bc20b1
    container_name: node_exporter
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points"
      - "^/(rootfs/)?(dev|etc|host|proc|run|sys|volume1)($$|/)"
    ports:
      - 9100:9100/tcp
    networks:
      monitoring:
        aliases:
          - nas.bds.home.arpa
    pid: host
    restart: always
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:dd4bced05dfaddf23a7ec50f87334993a4149f7fcfbf58456d1c8bafce91cd13
    container_name: prometheus
    volumes:
      - /volume1/docker_datas/prometheus:/prometheus:rw
    command:
      - "--config.file=/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=360d"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - 9090:9090/tcp
    networks:
      - monitoring
    restart: always
  grafana:
    image: grafana/grafana:13.0.2@sha256:b8f6abae513b839b2f3487343fa5e44d9c9d7871271fdd17689c4c452cb8098e
    container_name: grafana
    volumes:
      - /volume1/docker_datas/grafana:/var/lib/grafana
    ports:
      - 3000:3000/tcp
    environment:
      - GF_INSTALL_PLUGINS=grafana-strava-datasource,grafana-worldmap-panel
      - GF_PLUGINS_ENABLE_ALPHA=true
      - GF_STRAVA_DS_DATA_PATH=/var/lib/grafana/strava
    networks:
      - monitoring
    restart: always
  paperless-ngx:
    image: bdossantos/paperless-ngx:2.20.8-409b8a1@sha256:c5ca6fcc507da910d7882432e38a07d6ef76b29c3182eeaf6339253aa079b5eb
    container_name: paperless
    depends_on:
      - paperless-broker
      - paperless-db
      - paperless-gotenberg
      - paperless-tika
    ports:
      - 8000:8000/tcp
    volumes:
      - /volume1/docker_datas/paperless/consume:/app/consume
      - /volume1/docker_datas/paperless/data:/app/data
      - /volume1/docker_datas/paperless/export:/app/export
      - /volume1/docker_datas/paperless/media:/app/media
      - /volume1/docker_datas/paperless/static:/app/static
    environment:
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBPORT=5433
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_FILENAME_FORMAT={{ created_year }}/{{ title }}
      - PAPERLESS_READ_CACHE_REDIS_URL=redis://paperless-broker:6379
      - PAPERLESS_READ_CACHE_TTL=3600
      - PAPERLESS_REDIS=redis://paperless-broker:6379
      - PAPERLESS_TIKA_ENABLED=1
      - PAPERLESS_TIKA_ENDPOINT=http://papereless-tika:9998
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=http://paperless-gotenberg:3001
      - PAPERLESS_WEBSERVER_WORKERS=2
    env_file:
      - /volume1/docker_datas/paperless/.env
    networks:
      - paperless
    restart: always
  paperless-db:
    image: postgres:14.23-bookworm@sha256:bcb5887ba9b5a78399d03e977f770fcc11227e55ed6fc6405ff61973ccddfc1f
    container_name: paperless-db
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /volume1/docker_datas/paperless-db/14/data:/var/lib/postgresql/data
    env_file:
      - /volume1/docker_datas/paperless/.env
    command: -p 5433 -c shared_buffers=512MB -c effective_cache_size=2GB -c maintenance_work_mem=512MB -c min_wal_size=100MB -c max_wal_size=2GB -c max_worker_processes=4 -c max_parallel_workers_per_gather=2 -c max_parallel_workers=4 -c max_parallel_maintenance_workers=2 -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=4 -c effective_io_concurrency=2
    ports:
      - 5433:5433/tcp
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
    networks:
      - paperless
    restart: always
  paperless-broker:
    image: redis:7.4.9-bookworm@sha256:18a3d98ccee3b996ec4e79400904322b160b08dd063c71b5f46cea9ebc287bbb
    container_name: paperless-broker
    ports:
      - 6379:6379/tcp
    networks:
      - paperless
    restart: always
  paperless-gotenberg:
    image: docker.io/gotenberg/gotenberg:8.34.0@sha256:0ec4b0a125c55ff1dfaed071cab30e0f37cc4326f7d53d903ee5b24e4f27fd85
    container_name: paperless-gotenberg
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    environment:
      - DISABLE_GOOGLE_CHROME=1
    ports:
      - 3001:3000/tcp
    networks:
      - paperless
    restart: always
  paperless-tika:
    image: docker.io/apache/tika:latest
    container_name: paperless-tika
    ports:
      - 9998:9998/tcp
    networks:
      - paperless
    restart: always
  anki:
    image: bdossantos/anki:25.9.2-82365ce@sha256:0a2cfd28ad7316ee8e4ee69e176f1993b0a1fbf74012729ec0857df5dfaebdfe
    container_name: anki
    ports:
      - 8081:8080/tcp
    volumes:
      - /volume1/docker_datas/anki/data:/data
    environment:
      - SYNC_BASE=/data
    env_file:
      - /volume1/docker_datas/anki/.env
    networks:
      - anki
    restart: always
  radicale:
    image: bdossantos/radicale:3.6.0-82365ce@sha256:247689898891db7c21de181f6966b45dfc39f59090259965aeb794af6436f105
    container_name: radicale
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /volume1/docker_datas/radicale/data:/data
      - /volume1/docker_datas/radicale/users:/config/users:ro
    shm_size: 8M
    ports:
      - 5232:5232/tcp
    networks:
      - radicale
    restart: always

networks:
  home-assistant:
    ipam:
      driver: default
      config:
        - subnet: 172.10.0.0/16
          gateway: 172.10.0.1
  monitoring:
    ipam:
      driver: default
      config:
        - subnet: 172.11.0.0/16
          gateway: 172.11.0.1
  paperless:
    ipam:
      driver: default
      config:
        - subnet: 172.12.0.0/16
          gateway: 172.12.0.1
  anki:
    ipam:
      driver: default
      config:
        - subnet: 172.13.0.0/16
          gateway: 172.13.0.1
  radicale:
    ipam:
      driver: default
      config:
        - subnet: 172.14.0.0/16
          gateway: 172.14.0.1
